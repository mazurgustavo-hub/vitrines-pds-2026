async function uploadCroqui(localEncoded){const local=decodeURIComponent(localEncoded);const d=DATA.find(x=>x.local===local);const input=document.getElementById('croquiFile'),status=document.getElementById('croquiStatus');if(!input?.files?.length){status.textContent='Escolha um arquivo JPEG, PNG, WEBP ou PDF.';return}const file=input.files[0];const allowed=['image/jpeg','image/png','image/webp','application/pdf'];if(!allowed.includes(file.type)){status.textContent='Formato não permitido. Use JPEG, PNG, WEBP ou PDF.';return}if(file.size>15*1024*1024){status.textContent='Arquivo muito grande. Limite recomendado: 15 MB.';return}status.textContent='Enviando croqui para o GitHub...';try{const ext=(file.name.split('.').pop()||'bin').toLowerCase();const path=`croquis/${croquiKey(d)}.${ext}`;const url=`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/${path}`;let sha=null;const existing=await fetch(url,{headers:githubHeaders()});if(existing.ok){sha=(await existing.json()).sha}else if(existing.status!==404){throw new Error('Não foi possível verificar croqui atual.')}const payload={message:`Atualiza croqui de ${local}`,content:await fileToBase64(file),branch:'main'};if(sha)payload.sha=sha;const saved=await fetch(url,{method:'PUT',headers:githubHeaders({'Content-Type':'application/json'}),body:JSON.stringify(payload)});if(!saved.ok)throw new Error('Não foi possível enviar o arquivo. Verifique a permissão Contents: Read and write.');const savedBody=await saved.json();const current=await readGithubJson(CROQUIS_PATH,{});const updated=current.data&&typeof current.data==='object'&&!Array.isArray(current.data)?current.data:{};updated[croquiKey(d)]={local,name:file.name,type:file.type,path,url:savedBody.content.download_url,updatedAt:new Date().toISOString()};await writeGithubJson(CROQUIS_PATH,updated,`Atualiza índice de croqui de ${local}`);croquis=updated;if(currentLocation)infoWindow.setContent(popupHtml(currentLocation,getPopupSelectedEpoch(currentLocation),'croqui'))}catch(e){status.textContent=e.message;status.classList.add('error')}}
async function deleteCroqui(localEncoded){const local=decodeURIComponent(localEncoded);const d=DATA.find(x=>x.local===local);const item=croquis[croquiKey(d)];if(!item)return;if(!confirm(`Remover o croqui de ${local}?`))return;const status=document.getElementById('croquiStatus');status.textContent='Removendo croqui...';try{const url=`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/${item.path}`;const current=await fetch(url,{headers:githubHeaders()});if(current.ok){const body=await current.json();await fetch(url,{method:'DELETE',headers:githubHeaders({'Content-Type':'application/json'}),body:JSON.stringify({message:`Remove croqui de ${local}`,sha:body.sha,branch:'main'})})}const currentIndex=await readGithubJson(CROQUIS_PATH,{});const updated=currentIndex.data||{};delete updated[croquiKey(d)];await writeGithubJson(CROQUIS_PATH,updated,`Remove croqui do índice de ${local}`);croquis=updated;if(currentLocation)infoWindow.setContent(popupHtml(currentLocation,getPopupSelectedEpoch(currentLocation),'croqui'))}catch(e){status.textContent=e.message;status.classList.add('error')}}
