function manejoRows(local,epoch,treatment){return manejos.filter(m=>m.local===local&&String(m.epoch)===String(epoch)&&m.treatment===treatment).sort((a,b)=>String(b.date).localeCompare(String(a.date)))}
function treatmentPanel(e){return `<section class="epoch"><div class="epoch-head"><span class="badge">Época ${esc(e.epoch)}</span><span class="count">${e.entries.length} registros</span></div><div class="treatments">${e.entries.map(x=>`<div class="treatment"><strong>${esc(x.treatment)}</strong><span>Semeadura: ${esc(x.date)}</span></div>`).join('')}</div></section>`}
function manejoPanel(d,e){return `<section class="epoch"><div class="epoch-head"><span class="badge">Época ${esc(e.epoch)}</span></div>${uniqueTreatments(e).map(x=>{const rows=manejoRows(d.local,e.epoch,x.treatment);return `<div class="manejo-treatment"><div class="manejo-treatment-head"><strong>${esc(x.treatment)}</strong>${adminToken()?`<button class="mini-btn" data-local="${attr(d.local)}" data-epoch="${attr(e.epoch)}" data-treatment="${attr(x.treatment)}" onclick="openManejoForm(this)">+ Manejo</button>`:''}</div>${rows.length?rows.map(m=>`<div class="manejo-item"><div class="manejo-date">${esc(formatDate(m.date))}</div><div class="manejo-products">${m.products.map(p=>`${esc(p.product)} — ${esc(p.dose)} ${esc(p.unit)}`).join('<br>')}</div>${m.observation?`<div>${esc(m.observation)}</div>`:''}${adminToken()?`<div class="manejo-actions"><button class="mini-btn" data-id="${esc(m.id)}" onclick="editManejo(this)">Editar</button><button class="mini-btn danger" data-id="${esc(m.id)}" onclick="deleteManejo(this)">Excluir</button></div>`:''}</div>`).join(''):'<div class="status">Nenhum manejo registrado.</div>'}</div>`}).join('')}</section>`}
function popupHtml(d){const eps=selectedEpochs(d),route=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(d.lat+','+d.lon)}&travelmode=driving`;return `<div class="popup"><h2>${esc(d.local)}</h2><div class="coord">${esc(d.coordinate)}</div><a class="route-link" href="${route}" target="_blank" rel="noopener noreferrer">↗ Traçar rota no Google Maps</a><div class="popup-tabs"><button class="popup-tab active" onclick="switchPopupTab(this,'treatments')">Tratamentos</button><button class="popup-tab" onclick="switchPopupTab(this,'management')">Manejos</button></div><div class="tab-panel active" data-panel="treatments">${eps.map(treatmentPanel).join('')}</div><div class="tab-panel" data-panel="management"><div class="treatments">${eps.map(e=>manejoPanel(d,e)).join('')}</div></div></div>`}
function switchPopupTab(btn,name){const root=btn.closest('.popup');root.querySelectorAll('.popup-tab').forEach(x=>x.classList.toggle('active',x===btn));root.querySelectorAll('.tab-panel').forEach(x=>x.classList.toggle('active',x.dataset.panel===name))}
function openDetails(d,marker){currentLocation=d;infoWindow.setContent(popupHtml(d));infoWindow.open({anchor:marker,map});document.querySelectorAll('.location-card').forEach(x=>x.classList.toggle('active',x.dataset.key===key(d)))}
function focusLocation(d){const marker=markerByKey.get(key(d));if(marker){map.panTo(marker.getPosition());map.setZoom(Math.max(map.getZoom()||0,10));openDetails(d,marker)}}
function render(){if(!map)return;activeMarkers.forEach(m=>m.setMap(null));activeMarkers=[];markerByKey.clear();list.innerHTML='';const visible=DATA.filter(matches);document.getElementById('visibleCount').textContent=visible.length+' de '+DATA.length;if(!visible.length){list.innerHTML='<div class="empty">Nenhum local corresponde aos filtros.</div>';return}const bounds=new google.maps.LatLngBounds();visible.forEach(d=>{if(d.lat==null||d.lon==null)return;const marker=new google.maps.Marker({position:{lat:d.lat,lng:d.lon},map,title:d.local,label:{text:String(selectedEpochs(d).reduce((s,e)=>s+e.entries.length,0)),color:'#ffffff',fontWeight:'700'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:15,fillColor:'#176b4d',fillOpacity:1,strokeColor:'#fffdf8',strokeWeight:3}});marker.addListener('click',()=>openDetails(d,marker));activeMarkers.push(marker);markerByKey.set(key(d),marker);bounds.extend(marker.getPosition());const btn=document.createElement('button');btn.className='location-card';btn.dataset.key=key(d);btn.innerHTML=`<strong>${esc(d.local)}</strong><small>${selectedEpochs(d).map(e=>'Época '+esc(e.epoch)).join(' · ')} · ${selectedEpochs(d).reduce((s,e)=>s+e.entries.length,0)} registros</small>`;btn.onclick=()=>focusLocation(d);list.appendChild(btn)});if(!bounds.isEmpty()){map.fitBounds(bounds,45);google.maps.event.addListenerOnce(map,'idle',()=>{if(map.getZoom()>7)map.setZoom(7)})}}
function formatDate(v){if(!v)return 'Data não informada';const [y,m,d]=v.split('-');return `${d}/${m}/${y}`}
async function loadManejos(){try{const r=await fetch(`manejos.json?t=${Date.now()}`,{cache:'no-store'});manejos=r.ok?await r.json():[]}catch(e){manejos=[]}}
async function enterAdmin(){if(adminToken()){sessionStorage.removeItem('vitrinesGithubToken');updateAdminUI();if(currentLocation)openDetails(currentLocation,markerByKey.get(key(currentLocation)));return}const token=prompt('Cole o token de acesso do GitHub. Ele ficará apenas nesta aba e será apagado ao fechá-la.');if(!token)return;const r=await fetch('https://api.github.com/user',{headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github+json'}});if(!r.ok){alert('Token inválido ou sem acesso ao GitHub.');return}sessionStorage.setItem('vitrinesGithubToken',token.trim());updateAdminUI();if(currentLocation)openDetails(currentLocation,markerByKey.get(key(currentLocation)))}
function updateAdminUI(){const b=document.getElementById('adminButton'),on=!!adminToken();b.textContent=on?'Sair do modo administrador':'Entrar como administrador';b.classList.toggle('on',on)}
function addProductRow(product='',dose='',unit='L/ha'){const row=document.createElement('div');row.className='product-row';row.innerHTML=`<div><input class="field product-name" placeholder="Produto" value="${esc(product)}"></div><div><input class="field product-dose" type="number" min="0" step="any" placeholder="Dose" value="${esc(dose)}"></div><div><select class="field product-unit"><option>L/ha</option><option>mL/ha</option><option>kg/ha</option><option>g/ha</option><option>un/ha</option></select></div><button class="secondary remove-product" type="button">×</button>`;row.querySelector('.product-unit').value=unit;row.querySelector('.remove-product').onclick=()=>row.remove();document.getElementById('productRows').appendChild(row)}
function openManejoForm(btn){editingManejoId=null;const local=decodeURIComponent(btn.dataset.local),epoch=decodeURIComponent(btn.dataset.epoch),treatment=decodeURIComponent(btn.dataset.treatment);document.getElementById('manejoModal').dataset.local=local;document.getElementById('manejoModal').dataset.epoch=epoch;document.getElementById('manejoModal').dataset.treatment=treatment;document.getElementById('manejoContext').textContent=`${local} · Época ${epoch} · ${treatment}`;document.getElementById('manejoDate').value=new Date().toISOString().slice(0,10);document.getElementById('manejoObs').value='';document.getElementById('productRows').innerHTML='';addProductRow();document.getElementById('saveStatus').textContent='';document.getElementById('manejoModal').classList.add('open')}
function editManejo(btn){const m=manejos.find(x=>x.id===btn.dataset.id);if(!m)return;editingManejoId=m.id;const modal=document.getElementById('manejoModal');modal.dataset.local=m.local;modal.dataset.epoch=m.epoch;modal.dataset.treatment=m.treatment;document.getElementById('manejoContext').textContent=`${m.local} · Época ${m.epoch} · ${m.treatment}`;document.getElementById('manejoDate').value=m.date;document.getElementById('manejoObs').value=m.observation||'';document.getElementById('productRows').innerHTML='';m.products.forEach(p=>addProductRow(p.product,p.dose,p.unit));document.getElementById('saveStatus').textContent='';modal.classList.add('open')}
function decodeContent(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))))}
function encodeContent(s){return btoa(unescape(encodeURIComponent(s)))}
async function deleteManejo(btn){const record=manejos.find(x=>x.id===btn.dataset.id);if(!record)return;if(!confirm(`Excluir o manejo de ${formatDate(record.date)} para ${record.treatment}?\n\nEsta ação ficará registrada no histórico do GitHub.`))return;btn.disabled=true;btn.textContent='Excluindo...';try{const url=`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/${REPO.path}`,headers={Authorization:`Bearer ${adminToken()}`,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};const current=await fetch(url,{headers});if(!current.ok)throw new Error('Não foi possível ler os manejos no GitHub.');const body=await current.json(),remote=JSON.parse(decodeContent(body.content)),updated=remote.filter(x=>x.id!==record.id);const payload={message:`Remove manejo de ${record.treatment} em ${record.local}`,content:encodeContent(JSON.stringify(updated,null,2)),sha:body.sha,branch:'main'};const saved=await fetch(url,{method:'PUT',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!saved.ok)throw new Error('Não foi possível excluir. Verifique a permissão Contents: Read and write.');manejos=updated;if(currentLocation)openDetails(currentLocation,markerByKey.get(key(currentLocation)))}catch(e){alert(e.message);btn.disabled=false;btn.textContent='Excluir'}}
async function saveManejoRecord(){const modal=document.getElementById('manejoModal'),date=document.getElementById('manejoDate').value,products=[...document.querySelectorAll('.product-row')].map(r=>({product:r.querySelector('.product-name').value.trim(),dose:r.querySelector('.product-dose').value,unit:r.querySelector('.product-unit').value})).filter(p=>p.product&&p.dose);if(!date||!products.length){document.getElementById('saveStatus').textContent='Informe a data e ao menos um produto com dose.';return}const record={id:editingManejoId||((crypto.randomUUID&&crypto.randomUUID())||String(Date.now())),local:modal.dataset.local,epoch:modal.dataset.epoch,treatment:modal.dataset.treatment,date,products,observation:document.getElementById('manejoObs').value.trim(),updatedAt:new Date().toISOString()};const status=document.getElementById('saveStatus');status.textContent='Salvando no GitHub...';try{const url=`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/${REPO.path}`,headers={Authorization:`Bearer ${adminToken()}`,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};const current=await fetch(url,{headers});let sha=null,remote=[];if(current.ok){const body=await current.json();sha=body.sha;remote=JSON.parse(decodeContent(body.content))}else if(current.status!==404)throw new Error('Não foi possível ler os manejos no GitHub.');const idx=remote.findIndex(x=>x.id===record.id);if(idx>=0)remote[idx]=record;else remote.push(record);const payload={message:`Atualiza manejo de ${record.treatment} em ${record.local}`,content:encodeContent(JSON.stringify(remote,null,2)),branch:'main'};if(sha)payload.sha=sha;const saved=await fetch(url,{method:'PUT',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!saved.ok)throw new Error('O token precisa de permissão Contents: Read and write.');manejos=remote;modal.classList.remove('open');if(currentLocation)openDetails(currentLocation,markerByKey.get(key(currentLocation)))}catch(e){status.textContent=e.message}}
document.getElementById('adminButton').onclick=enterAdmin;document.getElementById('addProduct').onclick=()=>addProductRow();document.getElementById('cancelManejo').onclick=()=>document.getElementById('manejoModal').classList.remove('open');document.getElementById('saveManejo').onclick=saveManejoRecord;updateAdminUI();
window.initMap=async function(){await loadManejos();map=new google.maps.Map(document.getElementById('map'),{center:{lat:-26.3,lng:-52.7},zoom:6,mapTypeId:'roadmap',streetViewControl:false,mapTypeControl:true,fullscreenControl:true,gestureHandling:'greedy'});infoWindow=new google.maps.InfoWindow();search.addEventListener('input',render);epochFilter.addEventListener('change',render);render()};
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCXRmfIlWiuPpGaDTU1R-Y0wnlDnLMiRaU&callback=initMap&v=weekly"></script>
